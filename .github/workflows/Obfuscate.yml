name: Auto Update BPB Panel

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Download latest BPB worker.js
        run: |
          # 直接从官方最新 Release 中抓取已经编译和混淆好的 worker.js 链接并下载
          LATEST_URL=$(curl -s https://api.github.com/repos/bia-pain-bache/BPB-Worker-Panel/releases/latest | grep -oP '"browser_download_url": "\K(.*worker\.js)(?=")')
          wget -O _worker.js $LATEST_URL

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: main
          commit_message: ':arrow_up: Update to latest BPB panel release'
          commit_author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
          push_options: '--set-upstream'
